[build]
  command = "cd client && npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

[build.environment]
  REACT_APP_API_URL = "/.netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200